<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Feedback for Kamran.">
    <title>Feedback | Kamran</title>
    <link rel="icon" href="/favicon.svg?v=blockk" type="image/svg+xml">
    <link rel="stylesheet" href="../styles.css?v=dark-bg">
  </head>
  <body>
    <a class="home-button" href="/" aria-label="Back to home">←</a>
    <button class="theme-toggle" type="button" aria-label="Toggle color theme">
      <span class="icon-light">☽</span>
      <span class="icon-dark">☼</span>
    </button>

    <div class="main-content">
      <article class="feedback-page">
        <h2>Feedback</h2>
        <p class="feedback-note">Please feel free to share any comments on my work, or anything you believe may be of mutual interest to both of us.</p>
        <p class="feedback-note">All feedback is anonymous, but you can include your contact information in your message if you’d like me to get back to you.</p>
        <form class="feedback-form" action="https://formsubmit.co/4957a65271f1d4accd246dab51ea8750" method="POST">
          <input type="hidden" name="_subject" value="Anonymous website feedback">
          <input type="hidden" name="_template" value="box">
          <input type="hidden" name="_captcha" value="false">
          <div class="feedback-box">
            <label for="feedback">Feedback</label>
            <textarea id="feedback" name="feedback" required></textarea>

            <div class="feedback-actions">
              <button type="submit">Send</button>
            </div>
          </div>
          <p class="feedback-status" role="status" aria-live="polite"></p>
        </form>
      </article>
    </div>

    <footer>
      <p>@Copyright Kamran, 2026</p>
    </footer>

    <script src="../script.js"></script>
  </body>
</html>
